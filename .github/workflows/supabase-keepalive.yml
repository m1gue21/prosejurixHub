name: Supabase keep-alive

# Evita la pausa automática del plan Free (~7 días sin actividad).
# Requiere secrets: SUPABASE_URL, SUPABASE_ANON_KEY
# La función keepalive_ping() está en supabase/migrations/001_usuarios_tramites.sql

on:
  schedule:
    - cron: '0 */3 * * *' # cada 3 horas
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Faltan secrets SUPABASE_URL / SUPABASE_ANON_KEY"
            exit 1
          fi
          curl -sS -f -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/keepalive_ping" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json"
          echo
          echo "OK keep-alive $(date -u +%Y-%m-%dT%H:%M:%SZ)"
